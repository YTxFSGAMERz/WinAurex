# Netlify Configuration for WinAurex Documentation

[build]
  publish = "docs/dist"
  command = "npm run docs:build"

[build.environment]
  NODE_VERSION = "22"

# Custom headers for SEO, caching, and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    Content-Security-Policy = "default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; font-src 'self' data: https:;"
    X-Robots-Tag = "all"

# Aggressive caching for immutable Astro hashed assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts and images
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Redirect rules
[[redirects]]
  from = "/TWEAKS"
  to = "/tweaks/"
  status = 301

[[redirects]]
  from = "/tweaks"
  to = "/tweaks/"
  status = 301

[[redirects]]
  from = "/FAQ"
  to = "/faq/"
  status = 301
