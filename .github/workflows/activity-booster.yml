name: activity-booster

on:
  schedule:
    - cron: '0 0,6,12,18 * * *' # Runs 4 times a day (Midnight, 6AM, Noon, 6PM)
  workflow_dispatch: # Allows manual testing

jobs:
  boost:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Randomize Contribution
        run: |
          # 1. Random delay (0-10 minutes) to avoid fixed timestamps
          SLEEP_TIME=$((RANDOM % 600))
          echo "Waiting for $SLEEP_TIME seconds for organic timing..."
          sleep $SLEEP_TIME
          
          # 2. Probability check: 50% chance to do nothing to look "real"
          PROBABILITY=$((RANDOM % 100))
          if [ $PROBABILITY -lt 50 ]; then
            echo "Random skipping to maintain natural pattern."
            exit 0
          fi
          
          # 3. Random number of commits (1 to 3)
          NUM_COMMITS=$(( (RANDOM % 3) + 1 ))
          echo "Performing $NUM_COMMITS random commits..."
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          for i in $(seq 1 $NUM_COMMITS); do
            # Add a random unique string to the log
            echo "$(date): Maintenance update $i - $(head /dev/urandom | tr -dc A-Za-z0-9 | head -c 8)" >> .github/activity.log
            git add .github/activity.log
            git commit -m "chore(logs): automated maintenance check $(date +%Y-%m-%d)"
          done
          
          # 4. Push changes
          git push origin master
